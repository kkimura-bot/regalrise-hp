<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGAL RISE — HERO MOVIE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000; overflow: hidden;
      font-family: 'Bebas Neue', sans-serif;
    }

    /* ─── STAGE ─── */
    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ─── NOISE CANVAS ─── */
    #noise {
      position: absolute; inset: 0;
      opacity: 0;
      animation: noiseAnim 14s linear infinite;
      pointer-events: none; z-index: 1;
    }
    @keyframes noiseAnim {
      /* 0:00 イントロノイズ */
      0%          { opacity: .18; }
      7%          { opacity: .10; }
      /* 0:01 ザーザーバースト */
      8.5%        { opacity: .08; }
      9.5%        { opacity: .95; }
      11%         { opacity: .95; }
      12.5%       { opacity: .06; }
      /* 0:02 ザーザーバースト */
      18.5%       { opacity: .06; }
      19.5%       { opacity: .92; }
      21%         { opacity: .92; }
      22.5%       { opacity: .05; }
      /* 0:03 ザーザー → 完全暗転 */
      28.5%       { opacity: .05; }
      29.5%       { opacity: .90; }
      30%         { opacity: 0; }
      39%         { opacity: 0; }
      /* 0:04 暗転明けバースト */
      39.5%       { opacity: .85; }
      41%         { opacity: .85; }
      42%         { opacity: .04; }
      /* 通常期 */
      59%         { opacity: .04; }
      /* 0:08 ロゴ前バースト */
      78.5%       { opacity: .04; }
      79.5%       { opacity: .78; }
      81%         { opacity: .78; }
      82.5%       { opacity: .04; }
      100%        { opacity: .04; }
    }

    /* ─── FLASH ─── */
    .flash {
      position: absolute; inset: 0; background: #fff;
      opacity: 0; z-index: 50; pointer-events: none;
      animation: flashAnim 14s ease infinite;
    }
    @keyframes flashAnim {
      /* 1:00 切替フラッシュ */
      9%,11%   { opacity: 0; }
      10%      { opacity: .3; }
      /* 2:00 切替フラッシュ */
      19%,21%  { opacity: 0; }
      20%      { opacity: .25; }
      /* 3:00 暗転 */
      29%,41%  { opacity: 0; }
      30%,40%  { opacity: 0; }
      /* 8:00 ロゴ前 */
      79%,81%  { opacity: 0; }
      80%      { opacity: .15; }
      100%     { opacity: 0; }
    }

    /* ─── BLACKOUT (0:03–0:04) ─── */
    .blackout {
      position: absolute; inset: 0; background: #000;
      opacity: 0; z-index: 40; pointer-events: none;
      animation: blackoutAnim 14s ease infinite;
    }
    @keyframes blackoutAnim {
      0%,29%   { opacity: 0; }
      30%,40%  { opacity: 1; }
      41%,100% { opacity: 0; }
    }

    /* ─── 共通テキスト ─── */
    .scene-text {
      position: absolute; text-align: center;
      color: #fff; pointer-events: none;
      opacity: 0; z-index: 10;
    }

    /* ─── 0:00–0:01 NO SKILL ─── */
    .s-no-skill {
      font-family: 'Anton', sans-serif;
      font-size: clamp(48px, 10vw, 96px);
      letter-spacing: .05em;
      animation: noSkillAnim 14s ease infinite;
    }
    @keyframes noSkillAnim {
      0%          { opacity: 0; transform: scale(1.02); }
      2%          { opacity: 1; transform: scale(1); }
      7%          { opacity: 1; transform: scale(1); }
      10%         { opacity: 0; transform: scale(.98); }
      100%        { opacity: 0; }
    }

    /* ─── 0:01–0:02 NO NAME ─── */
    .s-no-name {
      font-family: 'Anton', sans-serif;
      font-size: clamp(48px, 10vw, 96px);
      letter-spacing: .05em;
      animation: noNameAnim 14s cubic-bezier(.22,1,.36,1) infinite;
    }
    @keyframes noNameAnim {
      0%,9%       { opacity: 0; transform: translateX(120px); }
      11%         { opacity: 1; transform: translateX(0); }
      18%         { opacity: 1; transform: translateX(0); }
      21%         { opacity: 0; transform: translateX(-60px); }
      100%        { opacity: 0; }
    }

    /* ─── 0:02–0:03 NO EXPERIENCE + GLITCH ─── */
    .s-no-exp {
      font-family: 'Anton', sans-serif;
      font-size: clamp(36px, 7vw, 80px);
      letter-spacing: .04em;
      animation: noExpAnim 14s ease infinite;
    }
    @keyframes noExpAnim {
      0%,19%      { opacity: 0; transform: translateX(0) skewX(0deg); }
      21%         { opacity: 1; transform: translateX(-4px) skewX(-2deg); filter: blur(1px); }
      22%         { opacity: 1; transform: translateX(4px) skewX(2deg); filter: blur(0); }
      23%         { opacity: 1; transform: translateX(-2px); }
      24%         { opacity: 1; transform: translateX(0); }
      28%         { opacity: 1; }
      30%         { opacity: 0; }
      100%        { opacity: 0; }
    }

    /* グリッチ重ね */
    .s-no-exp::before, .s-no-exp::after {
      content: 'NO EXPERIENCE';
      position: absolute; top: 0; left: 0; right: 0;
      animation: glitchLayer 14s ease infinite;
    }
    .s-no-exp::before {
      color: #ffffff; clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      animation-name: glitchBefore;
    }
    .s-no-exp::after {
      color: #ffffff; clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      animation-name: glitchAfter;
    }
    @keyframes glitchBefore {
      0%,20%    { opacity: 0; transform: translateX(0); }
      21%       { opacity: 1; transform: translateX(-6px); }
      23%       { opacity: 1; transform: translateX(4px); }
      25%       { opacity: 1; transform: translateX(-2px); }
      29%       { opacity: 0; }
      100%      { opacity: 0; }
    }
    @keyframes glitchAfter {
      0%,20%    { opacity: 0; transform: translateX(0); }
      21%       { opacity: 1; transform: translateX(5px); }
      23%       { opacity: 1; transform: translateX(-3px); }
      25%       { opacity: 1; transform: translateX(1px); }
      29%       { opacity: 0; }
      100%      { opacity: 0; }
    }

    /* ─── 0:04–0:06 DOESN'T MATTER ─── */
    .s-doesnt {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 22vw, 280px);
      color: #fff; letter-spacing: -.02em;
      line-height: .9;
      animation: doesntAnim 14s cubic-bezier(.22,1,.36,1) infinite;
    }
    @keyframes doesntAnim {
      0%,39%    { opacity: 0; transform: scale(.85); }
      41%       { opacity: 1; transform: scale(1.05); }
      44%       { opacity: 1; transform: scale(1); }
      57%       { opacity: 1; transform: scale(1.02); }
      60%       { opacity: 0; transform: scale(1.05); }
      100%      { opacity: 0; }
    }

    /* ─── 0:06–0:08 ALL YOU NEED / IS THE COURAGE / TO START ─── */
    .s-lines {
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(8px, 2vh, 20px);
    }
    .s-line {
      font-family: 'Teko', sans-serif;
      font-size: clamp(40px, 9vw, 120px);
      font-weight: 600; color: #fff;
      letter-spacing: .06em; opacity: 0;
      transform: translateY(30px);
    }
    .s-line-1 { animation: lineAnim 14s ease infinite; animation-delay: 0s; }
    .s-line-2 { animation: lineAnim 14s ease infinite; animation-delay: .4s; }
    .s-line-3 { animation: lineAnim 14s ease infinite; animation-delay: .8s; }

    /* ─── "TO START" だけ赤 ─── */
    .s-line-3 { color: #FF1E1E; }

    @keyframes lineAnim {
      0%,59%    { opacity: 0; transform: translateY(30px); }
      62%       { opacity: 1; transform: translateY(0); }
      77%       { opacity: 1; transform: translateY(0); }
      80%       { opacity: 0; transform: translateY(-10px); }
      100%      { opacity: 0; }
    }

    /* ─── 0:08–0:10 RED LIGHT ─── */
    .red-light {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(255,30,30,.4) 0%, transparent 65%);
      opacity: 0; z-index: 5; pointer-events: none;
      animation: redLightAnim 14s ease infinite;
    }
    @keyframes redLightAnim {
      0%,78%    { opacity: 0; }
      82%       { opacity: 1; }
      90%       { opacity: .8; }
      97%       { opacity: .6; }
      100%      { opacity: 0; }
    }

    /* 走る赤い光線 */
    .red-streak {
      position: absolute; left: 0; right: 0; height: 3px; top: -3px;
      background: linear-gradient(90deg, transparent, #FF1E1E, #fff, #FF1E1E, transparent);
      opacity: 0; z-index: 6; pointer-events: none;
      box-shadow: 0 0 16px #FF1E1E;
      animation: streakAnim 14s ease infinite;
    }
    .red-streak:nth-child(2) { animation-delay: .15s; height: 2px; opacity: 0; }
    @keyframes streakAnim {
      0%,79%    { opacity: 0; top: -3px; }
      80%       { opacity: .8; top: 0; }
      88%       { opacity: .4; top: 100%; }
      90%,100%  { opacity: 0; }
    }

    /* ─── 0:08–LOOP ロゴ ─── */
    .s-logo {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; opacity: 0; z-index: 20;
      animation: logoAnim 14s cubic-bezier(.22,1,.36,1) infinite;
    }
    .s-logo img {
      height: clamp(60px, 10vw, 100px);
      filter: invert(1);
    }
    .s-logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 11vw, 140px);
      color: #fff; letter-spacing: .08em; line-height: 1;
    }
    .s-logo-sub {
      font-family: 'Teko', sans-serif; font-size: clamp(14px, 2.5vw, 22px);
      letter-spacing: .35em; color: rgba(255,255,255,.5);
      text-transform: uppercase;
    }
    @keyframes logoAnim {
      0%,79%    { opacity: 0; transform: scale(.95); }
      82%       { opacity: 1; transform: scale(1.02); }
      86%,100%  { opacity: 1; transform: scale(1); }
    }

    /* ─── SCANLINE OVERLAY ─── */
    .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
      pointer-events: none; z-index: 100; opacity: .6;
    }

    /* ─── VIGNETTE ─── */
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,.7) 100%);
      pointer-events: none; z-index: 8;
    }

    /* ─── PROGRESS BAR ─── */
    .progress {
      position: fixed; bottom: 0; left: 0;
      height: 2px; background: #FF1E1E;
      animation: progressAnim 14s linear infinite;
      z-index: 200; transform-origin: left;
    }
    @keyframes progressAnim {
      from { width: 0; }
      to   { width: 100%; }
    }

    /* ─── SKIP/REPLAY ─── */
    .controls {
      position: fixed; bottom: 20px; right: 20px;
      font-family: 'Teko', sans-serif; font-size: 14px;
      letter-spacing: .15em; color: rgba(255,255,255,.3);
      z-index: 300; cursor: pointer;
      transition: color .2s;
    }
    .controls:hover { color: rgba(255,255,255,.8); }

    /* mobile */
    @media (max-width: 600px) {
      .s-doesnt { font-size: clamp(72px, 24vw, 200px); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-play-state: paused !important; }
    }
  </style>
</head>
<body>

<div class="stage">
  <!-- エフェクト層 -->
  <canvas id="noise"></canvas>
  <div class="flash"></div>
  <div class="blackout"></div>
  <div class="red-light"></div>
  <div class="red-streak"></div>
  <div class="red-streak" style="animation-delay:.15s"></div>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <!-- 0:00–0:01 NO SKILL -->
  <p class="scene-text s-no-skill">NO SKILL</p>

  <!-- 0:01–0:02 NO NAME -->
  <p class="scene-text s-no-name">NO NAME</p>

  <!-- 0:02–0:03 NO EXPERIENCE -->
  <p class="scene-text s-no-exp">NO EXPERIENCE</p>

  <!-- 0:04–0:06 DOESN'T MATTER -->
  <p class="scene-text s-doesnt">DOESN'T<br>MATTER.</p>

  <!-- 0:06–0:08 3行 -->
  <div class="scene-text s-lines" style="animation: lineWrap 14s ease infinite;">
    <p class="s-line s-line-1">ALL YOU NEED</p>
    <p class="s-line s-line-2">IS THE COURAGE</p>
    <p class="s-line s-line-3">TO START.</p>
  </div>

  <!-- 0:08–LOOP ロゴ -->
  <div class="scene-text s-logo">
    <img src="assets/logo/regalrise_logo.png" alt="RegalRise">
    <p class="s-logo-title">REGAL RISE</p>
    <p class="s-logo-sub">Your Journey Starts Here</p>
  </div>
</div>

<!-- フェードアウト幕 -->
<div id="fade-out" style="
  position:fixed;inset:0;background:#000;
  opacity:0;pointer-events:none;z-index:9999;
  transition:opacity .55s ease;
"></div>

<!-- プログレスバー -->
<div class="progress"></div>

<!-- SKIP ボタン -->
<div class="controls" id="skip-btn">SKIP →</div>

<style>
  @keyframes lineWrap {
    0%,59%  { opacity: 0; pointer-events: none; }
    60%     { opacity: 1; }
    79%     { opacity: 1; }
    81%     { opacity: 0; }
    100%    { opacity: 0; }
  }
</style>

<script>
  const canvas = document.getElementById('noise');
  const ctx = canvas.getContext('2d');
  let burstMode = false;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawNoise() {
    const W = canvas.width, H = canvas.height;
    const img = ctx.createImageData(W, H);
    const d = img.data;
    if (burstMode) {
      // テレビ砂嵐：RGB 独立ランダム、高 alpha
      for (let i = 0; i < d.length; i += 4) {
        d[i]   = Math.random() * 255;
        d[i+1] = Math.random() * 255;
        d[i+2] = Math.random() * 255;
        d[i+3] = 180 + Math.random() * 75;
      }
    } else {
      // 通常モノクロノイズ
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() > .5 ? 255 : 0;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = Math.random() * 55;
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  // シーン切り替わりタイミング（ms）に合わせてバーストを打つ
  const LOOP_MS   = 14000;
  const BURST_MS  = [1330, 2730, 4130, 5530, 11130]; // 各切替 70ms 前（14s換算）
  const BURST_DUR = 700;

  function triggerBurst() {
    burstMode = true;
    setTimeout(() => { burstMode = false; }, BURST_DUR);
  }

  const pageLoad = performance.now();

  function scheduleBurst(targetMs) {
    const elapsed = (performance.now() - pageLoad) % LOOP_MS;
    let delay = targetMs - elapsed;
    if (delay < 0) delay += LOOP_MS;
    setTimeout(() => {
      triggerBurst();
      setTimeout(() => scheduleBurst(targetMs), LOOP_MS);
    }, delay);
  }

  BURST_MS.forEach(t => scheduleBurst(t));

  function noiseLoop() {
    drawNoise();
    setTimeout(noiseLoop, burstMode ? 28 : 45);
  }
  noiseLoop();

  // ── 遷移先 HP ──
  const HP_URL = './home.html';

  function goToHP() {
    const fade = document.getElementById('fade-out');
    fade.style.pointerEvents = 'all';
    fade.style.opacity = '1';
    setTimeout(() => { window.location.href = HP_URL; }, 600);
  }

  // ロゴが安定した12.8秒で遷移開始（14秒ループが戻る前に黒にする）
  setTimeout(goToHP, 12800);

  // SKIP ボタン
  document.getElementById('skip-btn').addEventListener('click', goToHP);
</script>
</body>
</html>
